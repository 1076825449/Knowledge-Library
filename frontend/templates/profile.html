{% extends "base.html" %}

{% block title %}个人资料 - 企业税务知识库{% endblock %}

{% block main %}
<div class="page-container" style="max-width: 500px; margin: 0 auto; padding: 40px 20px;">
    <h1 style="margin-bottom: 24px;">个人资料</h1>

    <div class="card">
        <table class="profile-table">
            <tr><th>用户名</th><td><code>{{ user.username }}</code></td></tr>
            <tr><th>显示名</th><td>{{ user.display_name or '-' }}</td></tr>
            <tr><th>角色</th><td><span class="role-badge role-{{ user.role }}">{{ user.role }}</span></td></tr>
            <tr><th>创建时间</th><td>{{ user.created_at[:10] }}</td></tr>
        </table>
    </div>

    <div class="card" style="margin-top: 24px;">
        <h3 style="margin-top: 0;">修改资料</h3>
        <form method="post">
            <div class="form-field">
                <label>显示名称</label>
                <input type="text" name="display_name" value="{{ user.display_name or '' }}" placeholder="输入显示名称">
            </div>
            <div class="form-field">
                <label>新密码（留空则不修改）</label>
                <input type="password" name="new_password" placeholder="至少8位">
            </div>
            {% if error %}
            <p style="color: #d32f2f; font-size: 14px;">{{ error }}</p>
            {% endif %}
            <button type="submit" class="btn-primary">保存</button>
        </form>
    </div>
</div>
{% endblock %}

{% block styles %}
<style>
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; }
.profile-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.profile-table th { text-align: left; padding: 8px 0; width: 100px; color: var(--text-secondary); }
.profile-table td { padding: 8px 0; }
.role-badge { padding: 2px 10px; border-radius: 10px; font-size: 13px; font-weight: 500; }
.role-admin { background: #fff3e0; color: #e65100; }
.role-editor { background: #e3f2fd; color: #1565c0; }
.role-reviewer { background: #f3e5f5; color: #6a1b9a; }
.role-viewer { background: #f1f8e9; color: #2e7d32; }
.form-field { margin-bottom: 16px; }
.form-field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
.form-field input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-size: 14px; box-sizing: border-box; }
.form-field input:focus { outline: none; border-color: var(--accent); }
.btn-primary { padding: 8px 20px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
</style>
{% endblock %}
