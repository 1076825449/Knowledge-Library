{% extends "base.html" %}

{% block title %}登录 - 企业税务知识库{% endblock %}
{% block meta_robots %}noindex,nofollow{% endblock %}

{% block main %}
<div class="login-container">
    <div class="login-box">
        <h1>登录</h1>
        <p class="login-desc">访问企业税务知识库</p>
        <form method="post" class="login-form">
            <input type="text" name="username" placeholder="用户名" class="login-input" autofocus value="{{ request.form.username or '' }}" required>
            <input type="password" name="password" placeholder="密码" class="login-input" required>
            {% if error %}
            <p class="login-error">{{ error }}</p>
            {% endif %}
            <button type="submit" class="login-btn">登录</button>
        </form>
    </div>
</div>
{% endblock %}

{% block styles %}
<style>
.login-container { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 40px; width: 360px; text-align: center; }
.login-box h1 { font-size: 20px; margin-bottom: 8px; }
.login-desc { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
.login-form { display: flex; flex-direction: column; gap: 12px; }
.login-input { padding: 10px 14px; border: 1px solid var(--border); border-radius: 4px; font-size: 15px; background: var(--bg); color: var(--text); }
.login-input:focus { outline: none; border-color: var(--accent); }
.login-error { color: #d32f2f; font-size: 13px; margin: 0; }
.login-btn { padding: 10px; background: var(--accent); color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
.login-btn:hover { opacity: 0.9; }
</style>
{% endblock %}
