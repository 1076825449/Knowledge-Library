<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}企业税务知识库{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="/" class="logo">企业税务知识库</a>
            <nav class="main-nav">
                <a href="/">首页</a>
                <a href="/questions">问题列表</a>
                <a href="/question/new">新建问题</a>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        {% block main %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>企业税务知识库 · 数据来源于公开税务政策</p>
        </div>
    </footer>
</body>
</html>
