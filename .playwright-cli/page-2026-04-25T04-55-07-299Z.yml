    - generic [ref=e102]:
      - heading "高频问题" [level=2] [ref=e103]
      - list [ref=e104]:
        - listitem [ref=e105]:
          - link "[CHG-DEC-006] 企业在变更当月已经按旧习惯完成过一次申报，后来才发现主管归属或税种认定口径已经切换。这种情况下，原申报动作还有效吗，是否需要补救？ 简答：变更当月先按旧口径申报后又发现切换生效时，不能只凭提交成功判断有效性，应尽快核对回执结果和主管口径，再决定是否补救。" [ref=e106] [cursor=pointer]:
            - /url: /question/CHG-DEC-006
        - listitem [ref=e107]:
          - link "[CHG-RISK-006] 企业刚完成变更，系统短期内连续弹出多个异常或提示，但企业实际申报、扣款、开票都还能正常进行。面对这种可能是同步延迟的问题，最值得优先保存哪些证据？ 简答：变更后连续提示异常时，最值钱的证据不是截图越多越好，而是能证明“业务动作已正常完成”的回执、记录和时间点证据。" [ref=e108] [cursor=pointer]:
            - /url: /question/CHG-RISK-006
        - listitem [ref=e109]:
          - link "[CLS-DEC-006] 企业准备注销时，自认为最后一期主要税种都已申报，但之后又发现印花税等小税种有一笔遗漏。这种情况是否仍会被视为未完成申报、影响注销推进？ 简答：注销前哪怕只漏了一个小税种申报，也可能影响“申报是否完成”的判断，不能因为主税种已报就默认清税条件已满足。" [ref=e110] [cursor=pointer]:
            - /url: /question/CLS-DEC-006
        - listitem [ref=e111]:
          - link "[CLS-ETAX-006] 企业在正式提交清税申请前，想先利用电子税务局做一次内部自查。此时最值得先导出或先核对哪几类事项清单？ 简答：提交清税申请前，最值得先核的不是单一页面，而是未办结事项、申报状态、发票设备和实名权限这几类能直接卡流程的清单。" [ref=e112] [cursor=pointer]:
            - /url: /question/CLS-ETAX-006
        - listitem [ref=e113]:
          - link "[CLS-IIT-006] 企业注销阶段向个人股东打款，银行备注写的是“往来款退回”或“借款归还”，但同时又存在清算分配背景。此时个人所得税上为什么不能只按备注判断？ 简答：注销期向股东付款时，银行备注只能作为辅助线索，不能代替款项真实性质判断，否则个税口径很容易失真。" [ref=e114] [cursor=pointer]:
            - /url: /question/CLS-IIT-006
        - listitem [ref=e115]:
          - link "[CLS-INV-006] 企业在注销前已经基本停用发票系统或税控设备，后来又发现有一张历史发票的作废、红冲或状态处理没有彻底完成。这种尾项一般该如何收口？ 简答：注销前发现历史票据尾项未收完时，不能因为系统已停用就放弃处理，应先确认票据当前状态和可用路径，再补齐收口动作。" [ref=e116] [cursor=pointer]:
            - /url: /question/CLS-INV-006
    - generic [ref=e117]:
      - heading "新手必看" [level=2] [ref=e118]
      - list [ref=e119]:
        - listitem [ref=e120]:
          - link "新手 [SET-RISK-005] 新设企业成立后连续零申报了几个月，突然在系统里收到风险提醒或异常提示。此时企业第一步最应该先查哪一项，避免误判方向？ 简答：新设企业收到首个风险提示时，第一步不应先猜原因，而应先确认提示对应的是申报、登记、发票、实名还是待办链路中的哪一层。" [ref=e121] [cursor=pointer]:
            - /url: /question/SET-RISK-005
        - listitem [ref=e122]:
          - link "新手 [SET-TAX-006] 新设企业第一年已经收到并处理过一笔政府补贴，后来又因为项目调整退回了部分资金。面对这种退款，税务口径应如何与原先处理衔接？ 简答：补贴退款时，不能只看退款动作本身，更要回看原补贴性质、原申报口径和退款原因，再决定如何衔接处理。" [ref=e123] [cursor=pointer]:
            - /url: /question/SET-TAX-006
        - listitem [ref=e124]:
          - link "新手 [SET-CIT-005] 新设企业刚成立，暂时没有主营业务收入，但银行账户里产生了少量利息收入。面对这种情况，企业所得税上是否要把利息收入纳入预缴和后续汇算考虑？ 简答：首年没有主营收入但有银行利息，并不等于企业所得税就完全不用看；利息收入仍应纳入企业所得税口径和后续申报判断。" [ref=e125] [cursor=pointer]:
            - /url: /question/SET-CIT-005
        - listitem [ref=e126]:
          - link "新手 [SET-CLEAR-005] 新设企业刚领过发票或税控设备，还没正式做业务就决定终止项目。面对这种情况，发票缴销和清税注销的收尾顺序应该怎样安排更稳妥？ 简答：新设企业领票后即终止项目时，不宜把发票问题留到最后，通常应先核清票、设备和领用状态，再推进清税收尾。" [ref=e127] [cursor=pointer]:
            - /url: /question/SET-CLEAR-005
        - listitem [ref=e128]:
          - link "新手 [SET-ETAX-005] 新办企业第一次进入电子税务局后，系统里往往会出现多个待办、提醒和确认事项。哪些内容更适合当天就处理，避免后面越拖越乱？ 简答：首次登录电子税务局时，应优先处理影响后续办税链路的基础待办，例如实名、联系方式、税费种认定和系统通知确认。" [ref=e129] [cursor=pointer]:
            - /url: /question/SET-ETAX-005
        - listitem [ref=e130]:
          - link "新手 [SET-SSF-005] 新设企业刚开始运营，只招了一名员工或负责人兼任员工。此时社保费管理上，最先应该确认哪些核心口径，避免后续补手续？ 简答：新设企业人数少时，社保费管理最先应确认用工关系是否成立、参保和申报链路是否已打通，而不是简单理解为人少就能先放着。" [ref=e131] [cursor=pointer]:
            - /url: /question/SET-SSF-005
    - generic [ref=e132]:
      - heading "最近更新" [level=2] [ref=e133]
      - list [ref=e134]:
        - listitem [ref=e135]:
          - link "[CLS-DEC-001] 注销前须完成当期所有税种申报，包括增值税、企业所得税和个税吗？ 简答：注销前须完成当期所有税种的申报，包括增值税、企业所得税、个人所得税等，不得遗漏任一税种当期申报。" [ref=e136] [cursor=pointer]:
            - /url: /question/CLS-DEC-001
        - listitem [ref=e137]:
          - link "[CLS-FEE-001] 注销时发生的资产损失（包括存货报废、固定资产盘亏等），税务上如何处理？ 简答：注销时发生的资产损失（包括存货报废、固定资产盘亏等），须按规走程序在企业所得税税前扣除，已抵扣的进项税额须转出。" [ref=e138] [cursor=pointer]:
            - /url: /question/CLS-FEE-001
        - listitem [ref=e139]:
          - link "[CLS-PREF-001] 注销前已备案的税收优惠资格（如小型微利企业、高新技术企业等）还要收口吗？ 简答：注销前已备案的税收优惠资格（如小型微利企业、高新技术企业等）须在注销前自行向税务机关报告并结清优惠税款。" [ref=e140] [cursor=pointer]:
            - /url: /question/CLS-PREF-001
        - listitem [ref=e141]:
          - link "[RSK-TAX-005] 企业被税务机关稽查补税后，须在规定时限内缴纳税款吗？ 简答：企业被税务机关稽查补税后，须在规定时限内（一般15日内）缴纳本金和滞纳金，逾期将加收罚款，情节严重的可能构成犯罪。" [ref=e142] [cursor=pointer]:
            - /url: /question/RSK-TAX-005
        - listitem [ref=e143]:
          - link "[CLS-REG-003] 分支机构注销是否必须先于母公司完成？流程与普通注销相同吗？ 简答：分支机构注销须先于母公司完成，流程与普通注销相同：结清税款、缴销发票、取得清税证明，再到工商办理注销。" [ref=e144] [cursor=pointer]:
            - /url: /question/CLS-REG-003
        - listitem [ref=e145]:
          - link "[SET-RISK-002] 新设企业预防涉税风险的核心动作有哪些？ 简答：新设企业预防涉税风险的核心是：按时申报所有税种、专人负责发票管理、保留真实凭证、杜绝买卖发票。" [ref=e146] [cursor=pointer]:
            - /url: /question/SET-RISK-002
