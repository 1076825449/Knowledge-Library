    - heading "企业刚完成变更，系统里旧税种认定尚未完全退出，新认定又已经生效。遇到同月申报时，企业应优先以哪个状态判断申报责任？" [level=1] [ref=e27]
    - generic [ref=e28]:
      - strong [ref=e29]: 先按这个口径看：
      - text: 这是一条内部复核版问答，适合快速判断方向；遇到实际办税、金额较大或地方口径差异时，再核政策依据。
    - generic [ref=e30]:
      - generic [ref=e31]: 先给结论
      - generic [ref=e32]: 变更当月认定口径交叠时，不能只看页面显示，应以当前生效状态、应税事实和可提交结果综合判断申报责任。
    - generic [ref=e33]:
      - heading "怎么理解" [level=3] [ref=e34]
      - generic [ref=e35]: 变更期最常见的问题之一，就是系统状态切换慢于实际办理节奏。此时若只按旧页面习惯申报，容易把变更前后的责任混掉。 因此，应优先确认当前实际生效状态，再核对申报入口和回执结果，而不是凭“哪个入口还在”来判断。
    - generic [ref=e36]:
      - heading "先把概念说清楚" [level=3] [ref=e37]
      - generic [ref=e38]: 认定状态交叠并不等于责任重复，申报判断要以生效状态和事实期间为核心。
    - generic [ref=e39]:
      - heading "什么情况下适用" [level=3] [ref=e40]
      - generic [ref=e41]: 适用于企业变更当月税费种认定处于旧状态退出、新状态生效的交叠期。
    - generic [ref=e42]:
      - heading "哪些情况要小心" [level=3] [ref=e43]
      - generic [ref=e44]: （1）若仅为页面缓存，处理压力较小。 （2）若涉及主管税务机关变化，应更谨慎。 （3）不同税种切换节奏可能不同。
    - generic [ref=e45]:
      - heading "实际办理时怎么做" [level=3] [ref=e46]
      - generic [ref=e47]: 第一步：确认变更生效节点。 第二步：核对当前税费种认定状态。 第三步：用最小动作验证可提交入口。 第四步：保留回执和报错留痕。 第五步：对交叠月份做专项备注。
    - generic [ref=e48]:
      - heading "容易踩的坑" [level=3] [ref=e49]
      - generic [ref=e50]: （1）只按页面残留入口操作，容易错报。 （2）旧新认定混用，会造成后续解释困难。 （3）没有回执留痕，难证明当时按什么口径处理。
    - generic [ref=e51]: 适用地区：全国通用
    - generic [ref=e52]:
      - heading "怎么用这条答案" [level=3] [ref=e53]
      - generic [ref=e54]: 先看结论能不能回答你的问题；再看适用条件和边界，确认是不是同一种场景；最后看政策依据和关联问题，避免只看一句话就下判断。
