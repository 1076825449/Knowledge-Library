    - heading "企业刚完成变更，系统里旧税种认定尚未完全退出，新认定又已经生效。遇到同月申报时，企业应优先以哪个状态判断申报责任？" [level=1] [ref=e28]
    - generic [ref=e29]:
      - strong [ref=e30]: 使用提示：
      - text: 本页用于企业税务常见问题的快速判断，不替代针对具体交易、争议事项和重大金额场景的正式专业意见。
    - generic [ref=e31]:
      - generic [ref=e32]: 一句话结论
      - generic [ref=e33]: 变更当月认定口径交叠时，不能只看页面显示，应以当前生效状态、应税事实和可提交结果综合判断申报责任。
    - generic [ref=e34]:
      - heading "详细解答" [level=3] [ref=e35]
      - generic [ref=e36]: 变更期最常见的问题之一，就是系统状态切换慢于实际办理节奏。此时若只按旧页面习惯申报，容易把变更前后的责任混掉。 因此，应优先确认当前实际生效状态，再核对申报入口和回执结果，而不是凭“哪个入口还在”来判断。
    - generic [ref=e37]:
      - heading "核心定义" [level=3] [ref=e38]
      - generic [ref=e39]: 认定状态交叠并不等于责任重复，申报判断要以生效状态和事实期间为核心。
    - generic [ref=e40]:
      - heading "适用条件" [level=3] [ref=e41]
      - generic [ref=e42]: 适用于企业变更当月税费种认定处于旧状态退出、新状态生效的交叠期。
    - generic [ref=e43]:
      - heading "例外与边界" [level=3] [ref=e44]
      - generic [ref=e45]: （1）若仅为页面缓存，处理压力较小。 （2）若涉及主管税务机关变化，应更谨慎。 （3）不同税种切换节奏可能不同。
    - generic [ref=e46]:
      - heading "实务处理步骤" [level=3] [ref=e47]
      - generic [ref=e48]: 第一步：确认变更生效节点。 第二步：核对当前税费种认定状态。 第三步：用最小动作验证可提交入口。 第四步：保留回执和报错留痕。 第五步：对交叠月份做专项备注。
    - generic [ref=e49]:
      - heading "风险提示" [level=3] [ref=e50]
      - generic [ref=e51]: （1）只按页面残留入口操作，容易错报。 （2）旧新认定混用，会造成后续解释困难。 （3）没有回执留痕，难证明当时按什么口径处理。
    - generic [ref=e52]: 适用地区：全国通用
    - generic [ref=e53]:
      - heading "阅读口径" [level=3] [ref=e54]
