      - listitem [ref=e163]:
        - link "SET-CLEAR-005 设立期 清税注销 高频 新手 有条件 新设企业刚领过发票或税控设备，还没正式做业务就决定终止项目。面对这种情况，发票缴销和清税注销的收尾顺序应该怎样安排更稳妥？ 简答：新设企业领票后即终止项目时，不宜把发票问题留到最后，通常应先核清票、设备和领用状态，再推进清税收尾。 更新：2026-04-22 ›" [ref=e164] [cursor=pointer]:
