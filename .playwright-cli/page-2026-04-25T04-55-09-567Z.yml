        - link "SET-CLEAR-004 设立期 清税注销 高频 新手 有条件 企业刚设立并办完税务登记，还没真正开展经营活动就决定不做了。此时因为几乎没有业务，是否可以直接不管，还是仍然需要按清税注销流程处理？ 简答：即使新设企业尚未正式经营，只要已经形成登记主体和涉税状态，原则上也不能直接放着不管，仍应按实际状态判断并办理清税或注销收尾。 更新：2026-04-22" [ref=e198] [cursor=pointer]:
