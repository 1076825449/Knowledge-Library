          - generic [ref=e158]: 新设企业成立后连续零申报了几个月，突然在系统里收到风险提醒或异常提示。此时企业第一步最应该先查哪一项，避免误判方向？
          - generic [ref=e159]: 简答：新设企业收到首个风险提示时，第一步不应先猜原因，而应先确认提示对应的是申报、登记、发票、实名还是待办链路中的哪一层。
          - generic [ref=e160]: 更新：2026-04-22
      - listitem [ref=e161]:
        - link "SET-CLEAR-005 设立期 清税注销 高频 新手 有条件 新设企业刚领过发票或税控设备，还没正式做业务就决定终止项目。面对这种情况，发票缴销和清税注销的收尾顺序应该怎样安排更稳妥？ 简答：新设企业领票后即终止项目时，不宜把发票问题留到最后，通常应先核清票、设备和领用状态，再推进清税收尾。 更新：2026-04-22" [ref=e162] [cursor=pointer]:
          - /url: /question/SET-CLEAR-005
          - generic [ref=e163]:
