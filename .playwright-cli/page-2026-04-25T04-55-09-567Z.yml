          - generic [ref=e183]: 简答：首次登录电子税务局时，应优先处理影响后续办税链路的基础待办，例如实名、联系方式、税费种认定和系统通知确认。
          - generic [ref=e184]: 更新：2026-04-22
      - listitem [ref=e185]:
        - link "SET-VAT-005 设立期 增值税 高频 新手 有条件 新设企业刚开始试运营，还没正式开票，但已经收到了客户定金或预付款。面对这笔钱，增值税上最先应该关注什么？ 简答：首月收到定金时，增值税上不能只看“有没有开票”，更要先判断业务性质、纳税义务时间和后续履约安排。 更新：2026-04-22" [ref=e186] [cursor=pointer]:
