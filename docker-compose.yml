version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tax-knowledge-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-replace-with-a-long-random-secret}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-replace-with-a-strong-password}
      HOST: 0.0.0.0
      PORT: 5000
      FLASK_DEBUG: 0
      DATABASE_PATH: /app/database/db/tax_knowledge.db
    volumes:
      - ./database/db:/app/database/db
      - ./database/backups:/app/database/backups
      - ./data/reports:/app/data/reports
      - ./data/exports:/app/data/exports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
